name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-x64:
    name: build (windows-latest, win, x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build GitHub app
        run: bun run electron:build:github
        working-directory: .

      - name: Package Windows release
        run: npx electron-builder --win --x64 --publish never
        working-directory: apps/electron

      - name: Collect Windows release assets
        shell: pwsh
        working-directory: apps/electron
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag.TrimStart("v")
          $required = @(
            "latest.yml"
            "Profer-Setup-$version.exe"
            "Profer-Setup-$version.exe.blockmap"
          )

          New-Item -ItemType Directory -Force -Path "release-assets" | Out-Null
          foreach ($name in $required) {
            $source = Join-Path "out" $name
            if (-not (Test-Path -LiteralPath $source)) {
              Write-Host "Files in apps/electron/out:"
              Get-ChildItem -Path "out" -Recurse | Select-Object FullName, Length
              throw "Missing required Windows release asset: $name"
            }
            Copy-Item -LiteralPath $source -Destination "release-assets/$name" -Force
          }

      - name: Remove stale release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        working-directory: apps/electron
        run: |
          gh release delete "$env:GITHUB_REF_NAME" --repo "$env:GITHUB_REPOSITORY" --yes --cleanup-tag=false

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Profer ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: |
            apps/electron/release-assets/latest.yml
            apps/electron/release-assets/*.exe
            apps/electron/release-assets/*.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
